// Custom JS Animation variables for the marquee tags
let tagTranslate = 0;
let targetTagTranslate = 0;
let isTagHovered = false;

function checkMobile() {
    return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 768;
}
const isMobile = checkMobile();
if (isMobile) {
    document.body.classList.add('is-mobile');
}

// Generate unique tags and inject duplicate track for endless scrolling
function initTags() {
    const tags = [...new Set(ADVENTURES.flatMap(a => a.tags))].sort();
    const container = document.getElementById('tag-container');
    const tagsHTML = tags.map(t => `<span class="search-pill" onclick="toggleTag('${t}')">${t}</span>`).join('');
    container.innerHTML = `<div class="tag-marquee-track" id="tag-track">${tagsHTML}${tagsHTML}</div>`;
}

function toggleSearch() {
    const panel = document.getElementById('search-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function toggleTagsView() {
    tagsVisible = !tagsVisible;
    const tw = document.getElementById('tag-wrapper');
    const btn = document.getElementById('toggle-tags-btn');
    if (tagsVisible) {
        tw.style.display = 'flex';
        btn.style.background = '#064e3b';
    } else {
        tw.style.display = 'none';
        btn.style.background = '#10b981';
    }
}

// Smooth arrow scrolling function for the marquee tags
function scrollTags(dir) {
    targetTagTranslate += dir * 100; // Adjust for scroll distance per click
    isTagHovered = true; // Briefly pause auto-scroll
    setTimeout(() => { isTagHovered = false; }, 1200);
}

// Custom requestAnimationFrame loop for endless, smooth scrolling tags
function animateTags() {
    const track = document.getElementById('tag-track');
    if (track && tagsVisible) {
        if (!isTagHovered) {
            targetTagTranslate -= 0.4; // Half the speed of the original CSS animation
        }
        
        // Interpolate for smooth manual clicks
        tagTranslate += (targetTagTranslate - tagTranslate) * 0.1;
        
        const singleSetWidth = track.scrollWidth / 2; // Width of one exact copy of the tags
        
        // Safety check and endless loop shifting
        if (singleSetWidth > 0) {
            while (targetTagTranslate <= -singleSetWidth) {
                targetTagTranslate += singleSetWidth;
                tagTranslate += singleSetWidth;
            }
            while (targetTagTranslate > 0) {
                targetTagTranslate -= singleSetWidth;
                tagTranslate -= singleSetWidth;
            }
        }
        
        track.style.transform = `translateX(${tagTranslate}px)`;
    }
    requestAnimationFrame(animateTags);
}
// Start loop right away
requestAnimationFrame(animateTags);

function toggleTag(tag) {
    activeSearchTag = activeSearchTag === tag ? null : tag;
    const pills = document.querySelectorAll('.search-pill');
    pills.forEach(p => {
        if (p.innerText === tag && activeSearchTag === tag) p.classList.add('active');
        else p.classList.remove('active');
    });
    executeSearch();
}

function executeSearch() {
    const query = document.getElementById('search-input').value.toLowerCase();
    isSearching = query.length > 0 || activeSearchTag !== null;
    
    if (!isSearching) {
        renderFeed(activeIndices);
        return;
    }

    const filtered = ADVENTURES.map((adv, idx) => ({adv, idx})).filter(item => {
        const matchesText = item.adv.n.toLowerCase().includes(query) || item.adv.desc.toLowerCase().includes(query);
        const matchesTag = activeSearchTag ? item.adv.tags.includes(activeSearchTag) : true;
        return matchesText && matchesTag;
    });
    
    renderFeed(filtered.map(f => f.idx), true);
}

function reRoll() {
    // If we were searching, clear it and hide the panel
    if (isSearching) {
        document.getElementById('search-input').value = '';
        activeSearchTag = null;
        isSearching = false;
        document.getElementById('search-panel').style.display = 'none';
        document.querySelectorAll('.search-pill').forEach(p => p.classList.remove('active'));
    }

    if (firstLoad) {
        activeIndices = [7, 4, 9]; // Toketee, Blue Pool, Abiqua
        seenIndices = [...activeIndices];
        firstLoad = false;
    } else {
        let unseenIndices = ADVENTURES.map((_, i) => i).filter(i => !seenIndices.includes(i));
        if (unseenIndices.length < 3) {
            seenIndices = [];
            unseenIndices = ADVENTURES.map((_, i) => i);
        }
        activeIndices = unseenIndices.sort(() => Math.random() - 0.5).slice(0, 3);
        seenIndices.push(...activeIndices);
    }
    renderFeed(activeIndices, false, true);
}

function getNewAdventure() {
    let unseenIndices = ADVENTURES.map((_, i) => i).filter(i => !seenIndices.includes(i) && !activeIndices.includes(i));
    if (unseenIndices.length === 0) {
        seenIndices = [...activeIndices];
        unseenIndices = ADVENTURES.map((_, i) => i).filter(i => !activeIndices.includes(i));
    }
    const nextIdx = unseenIndices[Math.floor(Math.random() * unseenIndices.length)];
    seenIndices.push(nextIdx);
    return nextIdx;
}

function slideSlot(slotIdx, dir, dragOffset = 0) {
    if (slotIsAnimating[slotIdx] || isSearching) return;
    slotIsAnimating[slotIdx] = true;

    const track = document.getElementById(`track-${slotIdx}`);
    if (!track) {
        slotIsAnimating[slotIdx] = false;
        return;
    }

    const nextIdx = getNewAdventure();
    const newCardHTML = `<div class="card-wrapper">${generateCardHTML(ADVENTURES[nextIdx], nextIdx, false, 0)}</div>`;

    track.style.transition = 'none';
    if (dir === 1) { 
        track.insertAdjacentHTML('beforeend', newCardHTML);
        track.style.transform = `translateX(${dragOffset}px)`;
    } else { 
        track.insertAdjacentHTML('afterbegin', newCardHTML);
        track.style.transform = `translateX(calc(-100% + ${dragOffset}px))`;
    }

    void track.offsetWidth;

    track.style.transition = 'transform 0.65s cubic-bezier(0.25, 1, 0.5, 1)';
    if (dir === 1) {
        track.style.transform = `translateX(-100%)`;
    } else {
        track.style.transform = `translateX(0%)`;
    }

    setTimeout(() => {
        track.style.transition = 'none';
        track.style.transform = `translateX(0%)`;
        if (dir === 1) {
            track.firstElementChild.remove();
        } else {
            track.lastElementChild.remove();
        }
        activeIndices[slotIdx] = nextIdx;
        slotIsAnimating[slotIdx] = false;
    }, 650);
}

function startAutoSlide(slotIdx, dir, immediate = true) {
    if (isSearching) return;
    if (immediate) slideSlot(slotIdx, dir);
    slotTimers[slotIdx] = setInterval(() => {
        slideSlot(slotIdx, dir);
    }, 4500); 
}

function handleTouchStart(e, slotIdx) {
    if (slotIsAnimating[slotIdx]) return;
    clearInterval(slotTimers[slotIdx]);
    const touch = e.touches ? e.touches[0] : e;
    touchStartX[slotIdx] = touch.clientX;
    touchStartY[slotIdx] = touch.clientY;
    touchCurrentX[slotIdx] = touch.clientX;
}

function handleTouchMove(e, slotIdx) {
    if (slotIsAnimating[slotIdx] || touchStartX[slotIdx] == null) return;
    const touch = e.touches ? e.touches[0] : e;
    const deltaX = touch.clientX - touchStartX[slotIdx];
    const deltaY = touch.clientY - touchStartY[slotIdx];
    
    if (Math.abs(deltaY) > Math.abs(deltaX)) {
        touchStartX[slotIdx] = null;
        return;
    }
    
    touchCurrentX[slotIdx] = touch.clientX;
    const track = document.getElementById(`track-${slotIdx}`);
    if(track) {
        const visualDrag = Math.max(-60, Math.min(60, deltaX));
        track.style.transition = 'none';
        track.style.transform = `translateX(${visualDrag}px)`;
    }
}

function handleTouchEnd(e, slotIdx) {
    if (touchStartX[slotIdx] == null) return;
    const deltaX = touchCurrentX[slotIdx] - touchStartX[slotIdx];
    const visualDrag = Math.max(-60, Math.min(60, deltaX));
    
    if (Math.abs(deltaX) > 40) {
        const dir = deltaX < 0 ? 1 : -1; 
        slideSlot(slotIdx, dir, visualDrag);
    } else {
        const track = document.getElementById(`track-${slotIdx}`);
        if (track) {
            track.style.transition = 'transform 0.3s ease';
            track.style.transform = `translateX(0%)`;
        }
    }
    
    touchStartX[slotIdx] = null;
    const directions = [1, -1, 1];
    startAutoSlide(slotIdx, directions[slotIdx], false);
}

function renderFeed(indicesToRender, isSearch = false, shuffleEffect = false) {
    const feed = document.getElementById('feed');
    
    slotTimers.forEach(t => clearInterval(t));
    slotTimeouts.forEach(t => clearTimeout(t));
    slotTimers = [];
    slotTimeouts = [];

    if (indicesToRender.length === 0) {
        feed.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: #ffffff; font-size: 14px; font-weight: 800;">No adventures found. Try a different search!</div>`;
        return;
    }

    if (isSearch) {
        feed.innerHTML = indicesToRender.map((idx, i) => `
            <div style="margin-bottom:12px;">
                ${generateCardHTML(ADVENTURES[idx], idx, shuffleEffect, i * 0.15)}
            </div>
        `).join('') + `<div id="spacer" style="height: 100px; width: 100%;"></div>`;
    } else {
        feed.innerHTML = indicesToRender.map((idx, i) => `
            <div class="card-slot" id="slot-${i}">
                <div class="card-track" id="track-${i}"
                     ontouchstart="handleTouchStart(event, ${i})" 
                     ontouchmove="handleTouchMove(event, ${i})" 
                     ontouchend="handleTouchEnd(event, ${i})"
                     onmousedown="handleTouchStart(event, ${i})"
                     onmousemove="handleTouchMove(event, ${i})"
                     onmouseup="handleTouchEnd(event, ${i})"
                     onmouseleave="handleTouchEnd(event, ${i})">
                    <div class="card-wrapper">
                        ${generateCardHTML(ADVENTURES[idx], idx, shuffleEffect, i * 0.15)}
                    </div>
                </div>
            </div>
        `).join('') + `
        <a href="https://www.buymeacoffee.com/UNLOCKPNW" target="_blank" class="btn-donate" id="coffee-button">
            <span>☕ Buy me & my cute girl a coffee</span>
        </a>
        <div id="spacer" style="height: 100px; width: 100%;"></div>`;

        const directions = [1, -1, 1];
        slotTimeouts.push(setTimeout(() => startAutoSlide(0, directions[0], true), 1500));
        slotTimeouts.push(setTimeout(() => startAutoSlide(1, directions[1], true), 2500));
        slotTimeouts.push(setTimeout(() => startAutoSlide(2, directions[2], true), 3500));
    }
}
