let activeIndices = [];
let seenIndices = [];
let currentAdventureIndex = null;
let firstLoad = true;

function checkMobile() {
    return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 768;
}
const isMobile = checkMobile();
if (isMobile) {
    document.body.classList.add('is-mobile');
}

function reRoll() {
    if (firstLoad) {
        activeIndices = [11, 10, 13];
        seenIndices = [...activeIndices];
        firstLoad = false;
    } else {
        let unseenIndices = ADVENTURES.map((_, i) => i).filter(i => !seenIndices.includes(i));
        if (unseenIndices.length < 3) {
            seenIndices = [];
            unseenIndices = ADVENTURES.map((_, i) => i);
        }
        activeIndices = unseenIndices.sort(() => Math.random() - 0.5).slice(0, 3);
        seenIndices.push(...activeIndices);
    }
    updateUI(true);
}

function openShop(idx) {
    currentAdventureIndex = idx;
    const item = ADVENTURES[idx];
    const gearList = document.getElementById('gear-list');
    gearList.innerHTML = item.gear.map(g => `
        <div class="gear-item">
            <div style="display:flex; align-items:center; gap:12px;">
                <span style="font-size:20px;">${g.i}</span>
                <div>
                    <div style="font-size:12px; font-weight:800;">${g.n}</div>
                    <div style="font-size:10px; color:#4ade80; font-weight:900;">${g.p}</div>
                </div>
            </div>
            <a href="https://www.rei.com/search?q=${encodeURIComponent(g.n)}" target="_blank" class="pass-btn">BUY</a>
        </div>
    `).join('');
    document.getElementById('gear-overlay').style.display = 'block';
}

function closeGear() { document.getElementById('gear-overlay').style.display = 'none'; }

function shareHike(index) {
    const item = ADVENTURES[index];
    const text = `Check out ${item.n} on Compass PNW!`;
    if (navigator.share) navigator.share({ title: 'Compass PNW', text: text });
    else alert("Shared: " + text);
}

                        <div style="font-size: 11px; color: #fff; font-weight: 600;">${item.nature.join(' • ')}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 9px; font-weight: 800; color: #ef4444; text-transform: uppercase; margin-bottom: 4px;">Risk</div>

            <div style="margin-top: auto;">

                    <a href="http://googleusercontent.com/maps.google.com/search?api=1&query=${encodeURIComponent(item.n)}" target="_blank" class="btn-go">MAPS</a>
                    <a href="https://www.alltrails.com/explore?q=${encodeURIComponent(item.n)}" target="_blank" class="btn-secondary">

                            <path d="M12 4L4 18H20L12 4ZM12 8.5L16.5 16.5H7.5L12 8.5ZM12 11.5L14 15.5H10L12 11.5Z" fill="#5DE372"/>

                <div class="btn-share" onclick="shareHike(${index})">SHARE TRIP</div>
            </div>

    `;
    document.getElementById('detail-content').innerHTML = content;
    document.getElementById('detail-view').style.display = 'block';

// --- SLINGBACK SCRIPT ---
// Reduced threshold to limit how far down the user can scroll before snapping back
function applySlingBack(element, threshold = 60) {
    let scrollTimeout;
    element.addEventListener('scroll', function () {
        window.clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(function() {
            const maxScroll = element.scrollHeight - element.clientHeight;
            const currentScroll = element.scrollTop;
            
            if (currentScroll > maxScroll - threshold) {
                element.scrollTo({ top: 0, behavior: 'smooth' });
            }
            else if (currentScroll > 0 && currentScroll < threshold) {
                element.scrollTo({ top: maxScroll, behavior: 'smooth' });
            }
        }, 350); 
    }, { passive: true });
}

applySlingBack(document.getElementById('feed'), 60);
applySlingBack(document.getElementById('detail-view'), 60);

document.addEventListener("mousemove", e => {
    if (isMobile) return; 
    const phone = document.getElementById("phone");
    const x = (window.innerWidth / 2 - e.pageX) / 45;
    const y = (window.innerHeight / 2 - e.pageY) / 45;
    phone.style.transform = `scale(0.85) rotateX(${y}deg) rotateY(${-x}deg)`;
});

window.onload = () => { reRoll(); };

const emojiList = ["🌲", "⛰️", "🥾", "💧", "🧗", "⛺", "☀️", "🌸"];
function spawnEmoji() {
    const phoneRect = document.getElementById('phone').getBoundingClientRect();
    const el = document.createElement("div");
    el.className = "fall";
    el.innerText = emojiList[Math.floor(Math.random() * emojiList.length)];
    el.style.fontSize = "16px"; el.style.animationDuration = "12s"; 
    let spawnX = Math.random() < 0.5 
        ? Math.random() * (phoneRect.left - 50) 
        : (phoneRect.right + 20) + Math.random() * (window.innerWidth - phoneRect.right - 50);
    el.style.left = spawnX + "px";
    document.getElementById('bg-effects').appendChild(el);
    setTimeout(() => el.remove(), 12000);
}

function spawnInternalRain() {
    const internalBg = document.getElementById('internal-bg-effects');
    const el = document.createElement("div");
    el.className = "internal-fall";
    el.innerText = emojiList[Math.floor(Math.random() * emojiList.length)];
    el.style.left = Math.random() * 100 + "%";
    el.style.animationDuration = (10 + Math.random() * 8) + "s";
    internalBg.appendChild(el);
    setTimeout(() => el.remove(), 18000); 
}

setInterval(spawnEmoji, 1200);
setInterval(spawnInternalRain, 800);
